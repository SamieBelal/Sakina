name: sakina
description: "Islamic spiritual wellness app. Feel → Allah's Names → Quran → Dua."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Backend
  supabase_flutter: ^2.8.4

  # Payments
  purchases_flutter: ^8.6.0

  # Paywall — superwallkit_flutter removed: Swift compiler error with Xcode 26. Re-add when building paywall.

  # Analytics
  mixpanel_flutter: ^2.3.4

  # Push Notifications
  onesignal_flutter: ^5.2.9

  # UI
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1

  # Local Storage
  shared_preferences: ^2.3.4

  # Utilities
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  flutter_dotenv: ^5.2.1
  intl: ^0.19.0
  url_launcher: ^6.3.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/patterns/
