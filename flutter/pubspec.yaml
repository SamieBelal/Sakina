name: sakina
description: "Islamic spiritual wellness app. Feel → Allah's Names → Quran → Dua."
publish_to: 'none'
version: 1.3.0+6

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Backend
  supabase_flutter: ^2.8.4

  # Payments
  purchases_flutter: ^8.6.0
  purchases_ui_flutter: ^8.6.0

  # Paywall — superwallkit_flutter removed: Swift compiler error with Xcode 26. Re-add when building paywall.

  # Analytics
  mixpanel_flutter: ^2.3.4

  # Push Notifications
  onesignal_flutter: ^5.2.9

  # UI
  flutter_animate: ^4.5.2
  # characters is re-exported by the Flutter SDK; declare it explicitly so
  # analyzer doesn't warn (depend_on_referenced_packages).
  characters: ^1.4.0
  google_fonts: ^8.0.0
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1

  # Local Storage
  shared_preferences: ^2.3.4

  # Utilities
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  package_info_plus: ^8.1.0
  http: ^1.2.2
  intl: ^0.20.2
  url_launcher: ^6.3.1
  in_app_review: ^2.0.10
  app_links: ^6.4.0

  # IDs
  uuid: ^4.5.1

  # Auth
  sign_in_with_apple: ^6.1.3
  google_sign_in: ^6.2.2
  crypto: ^3.0.6

  cupertino_icons: ^1.0.8
  flutter_timezone: ^5.0.2
  home_widget: ^0.9.3
  lottie: ^3.3.3

  # Pauses the code-drawn companion medallion's animation when it scrolls
  # offscreen (streaks + companion plan, finding #12 — bounded animation).
  visibility_detector: ^0.4.0+2

  # Local scheduled notifications (duʿā-window calendar reminders — Phase 1).
  # `timezone` provides TZDateTime for zonedSchedule; the local zone name is
  # resolved via the existing flutter_timezone and fed to tz.getLocation().
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Duʿā-times feature (dua_acceptance_times widget)
  # Pinned exactly: adhan_dart port has historically re-cased/renamed members
  # (see docs/superpowers/specs/2026-07-15-dua-acceptance-times-widget-design.md §4).
  # A compile-guard test references SunnahTimes.lastThirdOfTheNight so an upgrade
  # that renames it fails CI.
  adhan_dart: 2.0.1
  # Pinned exactly: native (platform-channel) plugin — pin for build stability /
  # reproducible iOS+Android builds; bump deliberately after a device smoke test.
  geolocator: 14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  integration_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # Launch screen generation (dev-time only)
  flutter_native_splash: ^2.4.4

# Launch screen config — regenerate with:
#   dart run flutter_native_splash:create
flutter_native_splash:
  color: "#FBF7F2"
  image: assets/splash/logo.png
  color_dark: "#1C1917"
  image_dark: assets/splash/logo.png
  android: true
  ios: true
  web: false

flutter:
  uses-material-design: true

  shaders:
    - shaders/khatam_glow.frag

  assets:
    # No .env. All env values arrive via --dart-define-from-file=env.json
    # and are read through `lib/core/env.dart` (`Env.supabaseUrl` etc).
    # Bundling .env as an asset would leak secrets in the signed IPA.
    - assets/animations/
    - assets/content/
    - assets/widget/
    - assets/images/
    - assets/icons/
    - assets/patterns/
    - assets/illustrations/
    - assets/illustrations/main_screens/
    - assets/dua_calendar/
