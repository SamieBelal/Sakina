<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft gold glow behind the heart -->
    <radialGradient id="heartGlow" cx="100" cy="110" r="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5EBD9" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#F5EBD9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F5EBD9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background khatam motif (8-point star, same vocabulary as duas_header) -->
  <g opacity="0.06">
    <rect x="60" y="74" width="80" height="80" fill="none" stroke="#1B6B4A" stroke-width="1.2" transform="rotate(22.5 100 114)"/>
    <rect x="60" y="74" width="80" height="80" fill="none" stroke="#1B6B4A" stroke-width="1.2" transform="rotate(67.5 100 114)"/>
  </g>

  <!-- Radial gold glow -->
  <circle cx="100" cy="110" r="58" fill="url(#heartGlow)"/>

  <!-- Rounded lantern frame -->
  <rect x="40" y="45" width="120" height="130" rx="22" ry="22" fill="none" stroke="#1B6B4A" stroke-width="2.5"/>

  <!-- Corner 4-point sparkles -->
  <path d="M 40 41 L 40.85 44.15 L 44 45 L 40.85 45.85 L 40 49 L 39.15 45.85 L 36 45 L 39.15 44.15 Z" fill="#C8985E"/>
  <path d="M 160 41 L 160.85 44.15 L 164 45 L 160.85 45.85 L 160 49 L 159.15 45.85 L 156 45 L 159.15 44.15 Z" fill="#C8985E"/>
  <path d="M 40 171 L 40.85 174.15 L 44 175 L 40.85 175.85 L 40 179 L 39.15 175.85 L 36 175 L 39.15 174.15 Z" fill="#C8985E"/>
  <path d="M 160 171 L 160.85 174.15 L 164 175 L 160.85 175.85 L 160 179 L 159.15 175.85 L 156 175 L 159.15 174.15 Z" fill="#C8985E"/>

  <!-- Hero heart -->
  <path d="M 100 150 C 80 135 60 118 60 98 C 60 84 72 78 82 85 C 90 91 97 100 100 108 C 103 100 110 91 118 85 C 128 78 140 84 140 98 C 140 118 120 135 100 150 Z"
        fill="#C8985E" stroke="#134D36" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Tiny gold accent dot at the valley of the heart -->
  <circle cx="100" cy="112" r="1.4" fill="#FBF7F2" opacity="0.7"/>
</svg>
