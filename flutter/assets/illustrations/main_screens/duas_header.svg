<svg width="200" height="180" viewBox="0 0 200 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Warm gold light rising inside the mihrab -->
    <linearGradient id="archLight" x1="100" y1="130" x2="100" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5EBD9" stop-opacity="0"/>
      <stop offset="55%" stop-color="#F5EBD9" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#C8985E" stop-opacity="0.75"/>
    </linearGradient>
  </defs>

  <!-- Background khatam motif (two overlapping squares = 8-point star) -->
  <g opacity="0.06">
    <rect x="65" y="65" width="70" height="70" fill="none" stroke="#1B6B4A" stroke-width="1.2"/>
    <rect x="65" y="65" width="70" height="70" fill="none" stroke="#1B6B4A" stroke-width="1.2" transform="rotate(45 100 100)"/>
  </g>

  <!-- Mihrab arch interior (rising gold light) -->
  <path d="M 65 130 L 65 60 Q 65 25 100 20 Q 135 25 135 60 L 135 130 Z"
        fill="url(#archLight)"/>

  <!-- Mihrab arch outline -->
  <path d="M 65 130 L 65 60 Q 65 25 100 20 Q 135 25 135 60 L 135 130"
        fill="none" stroke="#1B6B4A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Rising dots (dua ascending through the arch) -->
  <circle cx="100" cy="108" r="2" fill="#C8985E" opacity="0.85"/>
  <circle cx="100" cy="88" r="1.7" fill="#C8985E" opacity="0.65"/>
  <circle cx="100" cy="68" r="1.4" fill="#C8985E" opacity="0.45"/>
  <circle cx="100" cy="48" r="1.1" fill="#C8985E" opacity="0.3"/>

  <!-- Apex 8-point khatam star crowning the arch -->
  <path d="M 100 7 L 101.11 11.32 L 104.95 9.05 L 102.68 12.89 L 107 14 L 102.68 15.11 L 104.95 18.95 L 101.11 16.68 L 100 21 L 98.89 16.68 L 95.05 18.95 L 97.32 15.11 L 93 14 L 97.32 12.89 L 95.05 9.05 L 98.89 11.32 Z"
        fill="#C8985E"/>

  <!-- Cupped bowl (abstract praying hands — pure geometry, no fingers) -->
  <path d="M 50 138 Q 100 152 150 138 L 150 146 Q 100 174 50 146 Z"
        fill="#1B6B4A"/>
  <!-- Subtle highlight along bowl rim -->
  <path d="M 52 138 Q 100 150 148 138" fill="none" stroke="#C8985E" stroke-width="0.8" opacity="0.35"/>

  <!-- Flanking 4-point sparkles -->
  <path d="M 42 104 L 42.85 107.15 L 46 108 L 42.85 108.85 L 42 112 L 41.15 108.85 L 38 108 L 41.15 107.15 Z"
        fill="#C8985E" opacity="0.75"/>
  <path d="M 158 104 L 158.85 107.15 L 162 108 L 158.85 108.85 L 158 112 L 157.15 108.85 L 154 108 L 157.15 107.15 Z"
        fill="#C8985E" opacity="0.75"/>
</svg>
